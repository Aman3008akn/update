<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RH2VDZFV44"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-RH2VDZFV44');
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MythManga Store</title>
    <!-- Google Fonts: Space Grotesk (Headings) & Outfit (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var pre = document.createElement('pre');
        pre.style.cssText = 'color: red; padding: 20px; font-size: 16px; font-family: monospace; z-index: 99999; position: fixed; top: 0; left: 0; background: white; width: 100%; height: 100%; overflow: auto;';
        pre.innerHTML = 'Error: ' + msg + '\nURL: ' + url + '\nLine: ' + lineNo + '\nColumn: ' + columnNo + '\nError object: ' + JSON.stringify(error);
        document.body.appendChild(pre);
        return false;
      };
      window.addEventListener('unhandledrejection', function(event) {
        var pre = document.createElement('pre');
        pre.style.cssText = 'color: red; padding: 20px; font-size: 16px; font-family: monospace; z-index: 99999; position: fixed; top: 0; left: 0; background: white; width: 100%; height: 100%; overflow: auto;';
        pre.innerHTML = 'Unhandled Promise Rejection: ' + (event.reason && event.reason.message ? event.reason.message : event.reason);
        if (event.reason && event.reason.stack) {
          pre.innerHTML += '\n\nStack:\n' + event.reason.stack;
        }
        document.body.appendChild(pre);
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
